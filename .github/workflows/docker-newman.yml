name: Lab04 Docker and Newman Verification

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build --no-cache -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            -e APP_ENV=production \
            -e SERVICE_NAME=iot-ingestion \
            -e SERVICE_VERSION=0.4.0 \
            -e LOG_LEVEL=INFO \
            -e AUTH_TOKEN=local-dev-token-for-ci \
            fit4110/iot-ingestion:lab04

      - name: Debug - Container status & logs
        run: |
          sleep 8
          echo "=== CONTAINER STATUS ==="
          docker ps -a
          echo "=== CONTAINER LOGS ==="
          docker logs fit4110-iot-lab04

      - name: Wait for service to be healthy
        run: |
          npx wait-on --timeout 30000 --httpVerb GET http://127.0.0.1:8000/health || \
          (echo "Health check failed" && docker logs fit4110-iot-lab04 && exit 1)

      - name: Run Newman tests on Docker container
        run: npm run test:local

      - name: Show full logs if test failed
        if: failure()
        run: docker logs fit4110-iot-lab04

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/